version: '3.8'

services:
  portfolio:
    build: .
    container_name: umair-portfolio
    ports:
      - "8080:80"
    restart: unless-stopped
    # Add healthcheck
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3